```
    <div class="price-box">
        <div class="price-label">Current Price</div>
        <div class="price" id="nasdaqPrice">
            <div class="loading"></div>
        </div>
        <div class="change" id="nasdaqChange" style="display: none;">
            <span>-- (--)</span>
        </div>
    </div>

    <div class="status">
        <div class="dot" id="statusDot"></div>
        <span id="statusText">Loading data...</span>
    </div>

    <div class="timestamp">
        Updated: <span id="timestamp">--:--</span>
    </div>

    <button id="refreshBtn" onclick="refreshPrice()">Refresh Now</button>

    <div id="error" class="error"></div>
    <div id="success" class="success">✓ Data loaded from CNBC API</div>
    
    <div class="setup-note" id="setupNote">
        ℹ️ <strong>Setup Required:</strong> Add your RapidAPI key in the code<br>
        Get free key at: <a href="https://rapidapi.com/apidojo/api/cnbc" target="_blank" style="color: #93c5fd; text-decoration: underline;">RapidAPI CNBC</a>
    </div>
</div>

<script>
    // ⚠️ REPLACE WITH YOUR RAPIDAPI KEY
    // Get free key from: https://rapidapi.com/apidojo/api/cnbc
    const RAPIDAPI_KEY = '88f9431f9dmsh8cf9a0bfe337d1dp1a857bjsnbea5335b9d63';
    const RAPIDAPI_HOST = 'cnbc.p.rapidapi.com';

    let isLoading = false;

    // Fetch NASDAQ data from CNBC API
    async function fetchNASDAQData() {
        try {
            if (RAPIDAPI_KEY === 'YOUR_RAPIDAPI_KEY_HERE') {
                showError('API key not configured. Please add your RapidAPI key.');
                document.getElementById('setupNote').style.display = 'block';
                document.getElementById('statusDot').className = 'dot error';
                document.getElementById('statusText').textContent = 'API key required';
                return;
            }

            isLoading = true;
            document.getElementById('refreshBtn').disabled = true;

            const options = {
                method: 'GET',
                headers: {
                    'x-rapidapi-key': RAPIDAPI_KEY,
                    'x-rapidapi-host': RAPIDAPI_HOST
                }
            };

            // CNBC API endpoint for NASDAQ Composite
            const response = await fetch(
                'https://cnbc.p.rapidapi.com/quotes/get?q=%5EGSPC',
                options
            );

            if (!response.ok) {
                if (response.status === 403) {
                    throw new Error('Invalid API key or rate limit exceeded');
                }
                throw new Error(`API error: ${response.status}`);
            }

            const data = await response.json();

            // Parse CNBC API response
            if (data.result && data.result.quotes && data.result.quotes.length > 0) {
                const quote = data.result.quotes[0];
                
                const priceData = {
                    current: quote.lastPrice,
                    change: quote.change,
                    changePercent: quote.percentChange,
                    timestamp: new Date()
                };

                updateDisplay(priceData);
                document.getElementById('error').style.display = 'none';
                document.getElementById('success').style.display = 'block';
                document.getElementById('setupNote').style.display = 'none';
                document.getElementById('statusDot').className = 'dot';
                document.getElementById('statusText').textContent = 'Connected to CNBC API';

            } else {
                throw new Error('No data in API response');
            }

        } catch (error) {
            console.error('Fetch error:', error);
            showError('Error: ' + error.message);
            document.getElementById('statusDot').className = 'dot error';
            document.getElementById('statusText').textContent = 'Connection failed';
        } finally {
            isLoading = false;
            document.getElementById('refreshBtn').disabled = false;
        }
    }

    function updateDisplay(data) {
        const priceEl = document.getElementById('nasdaqPrice');
        const changeEl = document.getElementById('nasdaqChange');

        const current = parseFloat(data.current).toFixed(2);
        const change = parseFloat(data.change).toFixed(2);
        const changePercent = parseFloat(data.changePercent).toFixed(2);
        const isPositive = data.change >= 0;

        priceEl.textContent = current;
        priceEl.style.color = '#f1f5f9';

        changeEl.className = `change ${isPositive ? 'positive' : 'negative'}`;
        changeEl.innerHTML = `
            <span>${isPositive ? '▲' : '▼'} ${Math.abs(change)} (${isPositive ? '+' : ''}${changePercent}%)</span>
        `;
        changeEl.style.display = 'inline-block';

        const now = new Date().toLocaleTimeString('en-US', {
            hour: '2-digit',
            minute: '2-digit',
            hour12: true
        });
        document.getElementById('timestamp').textContent = now;
    }

    function showError(message) {
        const errorDiv = document.getElementById('error');
        errorDiv.textContent = '⚠️ ' + message;
        errorDiv.style.display = 'block';
        document.getElementById('success').style.display = 'none';
    }

    function refreshPrice() {
        if (!isLoading) {
            document.getElementById('nasdaqPrice').innerHTML = '<div class="loading"></div>';
            fetchNASDAQData();
        }
    }

    // Initial fetch
    fetchNASDAQData();

    // Auto-refresh every 5 seconds
    setInterval(() => {
        if (!isLoading && RAPIDAPI_KEY !== 'YOUR_RAPIDAPI_KEY_HERE') {
            fetchNASDAQData();
        }
    }, 5000);
</script>
