```
    <div class="price-box">
        <div class="price-label">Current Price</div>
        <div class="price" id="nasdaqPrice">--</div>
        <div class="change" id="nasdaqChange">
            <span>-- (--)</span>
        </div>
    </div>

    <div class="status">
        <div class="dot"></div>
        <span>Live Updates</span>
    </div>

    <div class="timestamp">
        Updated: <span id="timestamp">--:--</span>
    </div>

    <button onclick="refreshPrice()">Refresh Now</button>

    <div id="error" style="display: none;"></div>
</div>

<script>
    // Fetch NASDAQ price
    async function fetchNASDAQ() {
        try {
            const response = await fetch(
                'https://query1.finance.yahoo.com/v10/finance/quoteSummary/%5EGSPC?modules=price',
                { mode: 'cors' }
            );
            
            if (!response.ok) throw new Error('API error');
            
            const data = await response.json();
            const price = data.quoteSummary.result[0].price;

            const priceValue = price.regularMarketPrice.raw;
            const change = price.regularMarketChange.raw;
            const changePercent = price.regularMarketChangePercent.raw;

            // Update DOM
            document.getElementById('nasdaqPrice').textContent = 
                priceValue.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

            const changeEl = document.getElementById('nasdaqChange');
            const isPositive = change >= 0;
            
            changeEl.className = `change ${isPositive ? 'positive' : 'negative'}`;
            changeEl.innerHTML = `
                <span>${isPositive ? '▲' : '▼'} ${Math.abs(change).toFixed(2)} (${isPositive ? '+' : ''}${changePercent.toFixed(2)}%)</span>
            `;

            // Update timestamp
            const now = new Date().toLocaleTimeString('en-US', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: true
            });
            document.getElementById('timestamp').textContent = now;

            // Hide error
            document.getElementById('error').style.display = 'none';

        } catch (error) {
            console.error('Error:', error);
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = '⚠️ Could not fetch data. Check internet connection.';
            errorDiv.style.display = 'block';
        }
    }

    function refreshPrice() {
        fetchNASDAQ();
    }

    // Initial fetch
    fetchNASDAQ();

    // Auto-refresh every 5 seconds
    setInterval(fetchNASDAQ, 5000);
</script>
